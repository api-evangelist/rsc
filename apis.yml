aid: rsc
name: RSC
description: >-
  The Royal Society of Chemistry (RSC) provides developer APIs through its ChemSpider platform, enabling programmatic
  access to one of the world's largest chemistry databases with over 88 million unique chemical compounds. The APIs
  support compound search, structure retrieval, format conversion, and data enrichment for cheminformatics applications.
type: Index
position: Consumer
access: 3rd-Party
